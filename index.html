<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>440 Music Mobile Homepage</title>

  <!-- ext-resource-dependency: assets referenced from JS strings (not HTML attrs) -->
  <!-- 440 brand SVGs (referenced from JSX strings) -->
  <meta name="ext-resource-dependency" content="assets/logo-440-header.svg" data-resource-id="logo440Header" />
  <meta name="ext-resource-dependency" content="assets/logo-440-aura.svg" data-resource-id="logo440Aura" />

  <!-- DSP logos -->
  <meta name="ext-resource-dependency" content="assets/dsp-spotify.svg" data-resource-id="dspSpotify" />
  <meta name="ext-resource-dependency" content="assets/dsp-apple-music.svg" data-resource-id="dspAppleMusic" />
  <meta name="ext-resource-dependency" content="assets/dsp-tiktok.svg" data-resource-id="dspTiktok" />
  <meta name="ext-resource-dependency" content="assets/dsp-youtube.svg" data-resource-id="dspYoutube" />

  <!-- REVOLT ecosystem brand logos: kept as CDN refs (sandbox CORS blocks bundling these). Requires internet for the 5 brand logos to render; everything else works offline. -->

  <!-- Roster artist images (rect + portrait pairs) -->
  <meta name="ext-resource-dependency" content="assets/artists/lex-bratcher-rect.png" data-resource-id="lexBratcherRect" />
  <meta name="ext-resource-dependency" content="assets/artists/lex-bratcher.png" data-resource-id="lexBratcher" />
  <meta name="ext-resource-dependency" content="assets/artists/lynae-vanee-rect.png" data-resource-id="lynaeVaneeRect" />
  <meta name="ext-resource-dependency" content="assets/artists/lynae-vanee.png" data-resource-id="lynaeVanee" />
  <meta name="ext-resource-dependency" content="assets/artists/father-romar-rect.png" data-resource-id="fatherRomarRect" />
  <meta name="ext-resource-dependency" content="assets/artists/father-romar.png" data-resource-id="fatherRomar" />
  <meta name="ext-resource-dependency" content="assets/artists/erykah-officer-rect.png" data-resource-id="erykahOfficerRect" />
  <meta name="ext-resource-dependency" content="assets/artists/erykah-officer.png" data-resource-id="erykahOfficer" />
  <meta name="ext-resource-dependency" content="assets/artists/shaolinn-rect.png" data-resource-id="shaolinnRect" />
  <meta name="ext-resource-dependency" content="assets/artists/shaolinn.png" data-resource-id="shaolinn" />
  <meta name="ext-resource-dependency" content="assets/artists/swayvo-twain-rect.png" data-resource-id="swayvoTwainRect" />
  <meta name="ext-resource-dependency" content="assets/artists/swayvo-twain.png" data-resource-id="swayvoTwain" />

  <!-- Testimonial photos -->
  <meta name="ext-resource-dependency" content="assets/artists/kllevv.jpg" data-resource-id="kllevv" />
  <meta name="ext-resource-dependency" content="assets/artists/gee-litt.jpg" data-resource-id="geeLitt" />
  <meta name="ext-resource-dependency" content="assets/artists/mike-steezy-2.jpg" data-resource-id="mikeSteezy" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css?v=5" />
  <style>
    body {
      background: rgb(7, 0, 56);
      min-height: 100vh;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 24px 0;
    }
    #stage { width: min(420px, 100vw); }
    #root { width: 100%; }
  </style>

  <template id="__bundler_thumbnail" data-bg-color="#070038">
    <svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
      <rect width="600" height="600" fill="#070038" />
      <text x="300" y="345" text-anchor="middle"
            font-family="Mango Grotesque, Anton, Impact, sans-serif"
            font-weight="800" font-size="220" fill="#00E387"
            letter-spacing="-8">440</text>
    </svg>
  </template>
</head>
<body>
  <div id="stage">
    <div id="root"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Sections.jsx"></script>
  <script type="text/babel" src="Sections2.jsx"></script>
  <script type="text/babel" src="Sections3.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
